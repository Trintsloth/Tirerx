<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0C0C14;font-family:'Segoe UI',system-ui,sans-serif;color:#fff}
::-webkit-scrollbar{width:3px}

@keyframes su{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.su{animation:su 0.32s ease forwards}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu 0.28s ease forwards}
input::placeholder{color:#8A8A96}
select option{background:#1a1a2a}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState}=React;

const CX={hot:"☀️",wet:"🌧️",cold:"❄️",snowy:"🌨️",mild:"🌤️"};
const TIRES=[
{id:1,brand:"Michelin",model:"Defender2",type:"All-Season",price:159,rating:4.9,mileage:"80,000",badge:"Best Overall",badgeColor:"#C9A84C",emoji:"🛞",climates:["mild","hot","wet"],budgets:["mid","premium"],styles:["commuter","family"],terrains:["highway","city"],scores:{treadLife:10,rideComfort:8,roadNoise:8,tractionBraking:9,handling:8},pros:["Industry-leading tread life","Exceptionally quiet on highways","Excellent wet-road grip"],affiliatePct:8},
{id:2,brand:"Bridgestone",model:"Blizzak WS90",type:"Winter",price:189,rating:4.8,mileage:"40,000",badge:"Top Winter",badgeColor:"#5B9BD5",emoji:"❄️",climates:["cold","snowy"],budgets:["mid","premium"],styles:["commuter","family"],terrains:["city","highway"],scores:{treadLife:6,rideComfort:7,roadNoise:7,tractionBraking:10,handling:8},pros:["#1-rated snow and ice tire","Confident stopping on ice","Cold-weather compound stays flexible"],affiliatePct:9},
{id:3,brand:"Goodyear",model:"Assurance WeatherReady",type:"All-Weather",price:145,rating:4.7,mileage:"60,000",badge:"Best Value",badgeColor:"#4CAF7D",emoji:"🌧️",climates:["wet","mild","cold"],budgets:["value","mid"],styles:["commuter","family"],terrains:["highway","city"],scores:{treadLife:8,rideComfort:8,roadNoise:7,tractionBraking:8,handling:7},pros:["Three-peak mountain rated","True year-round versatility","Confident in heavy rain"],affiliatePct:7},
{id:4,brand:"Continental",model:"TerrainContact A/T",type:"All-Terrain",price:215,rating:4.6,mileage:"60,000",badge:"Best Adventure",badgeColor:"#E07B39",emoji:"🏔️",climates:["mild","wet","hot"],budgets:["mid","premium"],styles:["adventure","offroad"],terrains:["offroad","mixed"],scores:{treadLife:8,rideComfort:6,roadNoise:6,tractionBraking:8,handling:7},pros:["Light off-road capable","Reinforced sidewalls","Low road noise for AT"],affiliatePct:8},
{id:5,brand:"Pirelli",model:"P Zero",type:"Performance",price:249,rating:4.8,mileage:"30,000",badge:"Best Performance",badgeColor:"#D94F4F",emoji:"🏎️",climates:["mild","hot","dry"],budgets:["premium"],styles:["sport","performance"],terrains:["highway","city"],scores:{treadLife:5,rideComfort:7,roadNoise:6,tractionBraking:9,handling:10},pros:["Razor-sharp steering response","Rock-solid at high speed","Factory fitment on supercars"],affiliatePct:10},
{id:6,brand:"Kumho",model:"Solus TA31",type:"All-Season",price:89,rating:4.4,mileage:"50,000",badge:"Best Budget",badgeColor:"#8B5CF6",emoji:"💰",climates:["mild","hot","wet"],budgets:["value"],styles:["commuter","family"],terrains:["city","highway"],scores:{treadLife:7,rideComfort:7,roadNoise:7,tractionBraking:7,handling:6},pros:["Outstanding price-to-quality ratio","Dependable everyday driver","Fuel-efficient low rolling resistance"],affiliatePct:6},
];
const SHOPS=[
{id:1,img:"DT",name:"Discount Tire",address:"1420 Washtenaw Ave",distance:0.8,rating:4.8,reviews:1240,wait:"~45 min",openNow:true,hours:"8am-6pm",price:"$25-$35/tire",badge:"TireRx Partner",badgeColor:"#C9A84C",certified:true,x:62,y:38,services:["Mount and Balance","TPMS Reset","Rotation","Alignment"],brands:["Michelin","Goodyear","Bridgestone"]},
{id:2,img:"PB",name:"Pep Boys Auto",address:"3975 Packard St",distance:2.1,rating:4.3,reviews:567,wait:"~30 min",openNow:true,hours:"7am-7pm",price:"$20-$30/tire",badge:"Trusted Partner",badgeColor:"#4CAF7D",certified:false,x:28,y:55,services:["Mount and Balance","TPMS Reset","Oil Change"],brands:["Goodyear","Pirelli","Kumho"]},
{id:3,img:"BT",name:"Belle Tire",address:"2300 S State St",distance:2.7,rating:4.6,reviews:892,wait:"~60 min",openNow:true,hours:"8am-8pm",price:"$22-$32/tire",badge:"TireRx Partner",badgeColor:"#C9A84C",certified:true,x:50,y:72,services:["Mount and Balance","Alignment","TPMS"],brands:["Michelin","BFGoodrich","General"]},
{id:4,img:"MV",name:"Mavis Discount Tire",address:"500 Eisenhower Pkwy",distance:3.4,rating:4.2,reviews:318,wait:"~90 min",openNow:false,hours:"8am-6pm",price:"$18-$28/tire",badge:"Verified Shop",badgeColor:"#5B9BD5",certified:false,x:72,y:65,services:["Mount and Balance","TPMS Reset"],brands:["Hankook","Toyo","Nexen"]},
{id:5,img:"TC",name:"Town and Country Tire",address:"710 Airport Blvd",distance:4.2,rating:4.9,reviews:203,wait:"~20 min",openNow:true,hours:"8am-5pm",price:"$30-$45/tire",badge:"Top Rated Local",badgeColor:"#E07B39",certified:true,x:20,y:80,services:["Mount and Balance","Alignment","Custom Wheels"],brands:["Michelin","Pirelli","Nitto"]},
{id:6,img:"CO",name:"Costco Auto Center",address:"4100 Baldwin Rd",distance:5.1,rating:4.7,reviews:1560,wait:"Same-day appt",openNow:true,hours:"9am-8pm",price:"$21/tire + lifetime rotation",badge:"TireRx Partner",badgeColor:"#C9A84C",certified:true,x:80,y:25,services:["Mount and Balance","Nitrogen Fill","TPMS","Rotation"],brands:["Michelin","Bridgestone","Goodyear"]},
];
const PRIS=[
{key:"treadLife",label:"Tread Life",icon:"⏱",desc:"How long the tire lasts"},
{key:"rideComfort",label:"Ride Comfort",icon:"🛋",desc:"Smooth cushioned feel"},
{key:"roadNoise",label:"Road Noise",icon:"🔇",desc:"Quiet cabin at speed"},
{key:"tractionBraking",label:"Safety and Traction",icon:"🛡",desc:"Grip braking wet weather"},
{key:"handling",label:"Handling",icon:"🎯",desc:"Steering and cornering"},
];
function matchTires(p){
const top3=Object.entries(p.priorities).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>k);
return TIRES.map(t=>{let s=0;if(p.climate&&t.climates.includes(p.climate))s+=4;if(p.budget&&t.budgets.includes(p.budget))s+=3;if(p.style&&t.styles.includes(p.style))s+=2;if(p.terrain&&t.terrains.includes(p.terrain))s+=2;top3.forEach(k=>s+=(t.scores[k]||0)*1.2);return{...t,score:Math.round(s)};}).sort((a,b)=>b.score-a.score).slice(0,3);
}
function climateFrom(st){
if(["AK","VT","NH","ME","NY","MI","MN","WI"].includes(st))return"snowy";
if(["ND","SD","MT","WY","CO","ID","PA","OH","IN","IL","IA","MO","NE","KS"].includes(st))return"cold";
if(["WA","OR","FL","LA","AL","MS","GA","SC"].includes(st))return"wet";
if(["AZ","TX","NM","NV","CA","HI","OK"].includes(st))return"hot";
return"mild";
}
function Stars({r}){return <span style={{display:"inline-flex",alignItems:"center",gap:1}}>{[1,2,3,4,5].map(i=><span key={i} style={{color:i<=Math.round(r)?G:"#333",fontSize:12}}>★</span>)}<span style={{fontSize:11,color:GL,marginLeft:4,fontWeight:600}}>{r}</span></span>;}
function Logo({size=30}){return <div style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(135deg,${G},${GL})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.46,flexShrink:0,boxShadow:`0 0 ${size}px rgba(201,168,76,0.3)`}}>🛞</div>;}
function PBtn({children,onClick,disabled}){return <button onClick={onClick} disabled={disabled} style={{width:"100%",padding:"15px",background:disabled?"rgba(255,255,255,0.07)":`linear-gradient(135deg,${G},${GL})`,border:"none",borderRadius:13,fontSize:15,fontWeight:700,color:disabled?T3:"#0a0a10",cursor:disabled?"not-allowed":"pointer",marginTop:10}}>{children}</button>;}
function GBtn({children,onClick}){return <button onClick={onClick} style={{width:"100%",padding:"13px",background:"transparent",border:`1px solid ${BORDER}`,borderRadius:13,fontSize:14,fontWeight:600,color:T3,cursor:"pointer",marginTop:8}}>{children}</button>;}
function Tag({children,color}){return <span style={{fontSize:11,padding:"4px 10px",borderRadius:99,background:color?"rgba(201,168,76,0.12)":CARD,color:color||T3,border:`1px solid ${color?"rgba(201,168,76,0.25)":BORDER}`,display:"inline-flex",alignItems:"center",gap:4}}>{children}</span>;}
function Inp({value,onChange,placeholder,maxLength,inputMode}){return <input value={value} onChange={onChange} placeholder={placeholder} maxLength={maxLength} inputMode={inputMode} style={{width:"100%",padding:"13px 14px",background:"rgba(255,255,255,0.06)",border:`1.5px solid ${BORDER}`,borderRadius:11,color:T1,fontSize:15,outline:"none",marginBottom:2}}/>;}
function FL({children}){return <div style={{fontSize:12,color:T3,fontWeight:600,marginBottom:6}}>{children}</div>;}
function Shell({children,step,total,label,onBack}){
return <div style={{minHeight:"100vh",background:`radial-gradient(ellipse at 50% 0%,#1a1a2e,${BG})`,color:T1,display:"flex",flexDirection:"column",alignItems:"center",padding:"0 20px 70px"}}>
<div className="su" style={{width:"100%",maxWidth:460,paddingTop:24}}>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:total?14:22}}>
<div style={{display:"flex",alignItems:"center",gap:10}}><Logo/><div><div style={{fontSize:17,fontWeight:800,color:T1,letterSpacing:"-0.5px"}}>TireRx</div>{label&&<div style={{fontSize:10,color:G,letterSpacing:"0.8px",textTransform:"uppercase",marginTop:1}}>{label}</div>}</div></div>
{onBack&&<button onClick={onBack} style={{background:"none",border:"none",color:T3,fontSize:13,cursor:"pointer",padding:"6px 10px"}}>Back</button>}
</div>
{total&&<div style={{marginBottom:22}}><div style={{display:"flex",gap:5,marginBottom:6}}>{Array.from({length:total}).map((_,i)=><div key={i} style={{flex:1,height:3,borderRadius:99,background:i<step?`linear-gradient(90deg,${G},${GL})`:"rgba(255,255,255,0.1)"}}/>)}</div><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,color:T3}}>Step {step} of {total}</span><span style={{fontSize:11,color:G,fontWeight:600}}>{Math.round((step/total)*100)}% complete</span></div></div>}
{children}
</div></div>;}
function Opt({icon,label,sub,onClick}){return <button onClick={onClick} style={{background:CARD,border:`1.5px solid ${BORDER}`,borderRadius:14,padding:"15px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,width:"100%",color:T1,marginBottom:10,textAlign:"left"}}><span style={{fontSize:26,flexShrink:0}}>{icon}</span><div style={{flex:1}}><div style={{fontWeight:700,fontSize:15,color:T1}}>{label}</div>{sub&&<div style={{fontSize:12,color:T2,marginTop:3}}>{sub}</div>}</div><span style={{color:T3,fontSize:20}}>›</span></button>;}
function MapView({shops,sel,onSel}){return <div style={{width:"100%",height:"100%",background:"#0a0a18",borderRadius:14,overflow:"hidden",position:"relative"}}><svg viewBox="0 0 100 100" style={{width:"100%",height:"100%",position:"absolute",inset:0}}>{[20,40,60,80].map(n=><g key={n}><line x1={n} y1={0} x2={n} y2={100} stroke="rgba(255,255,255,0.04)" strokeWidth="0.3"/><line x1={0} y1={n} x2={100} y2={n} stroke="rgba(255,255,255,0.04)" strokeWidth="0.3"/></g>)}<path d="M5,40 Q35,38 55,37 Q75,36 95,35" fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="2" strokeLinecap="round"/><path d="M5,62 Q40,60 70,59 Q82,59 95,58" fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="2" strokeLinecap="round"/><path d="M48,5 Q49,30 50,55 Q51,75 52,95" fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="2" strokeLinecap="round"/><circle cx="50" cy="50" r="10" fill="rgba(74,168,255,0.08)"/><circle cx="50" cy="50" r="5" fill="rgba(74,168,255,0.2)"/><circle cx="50" cy="50" r="2.5" fill="#4AA8FF"/>{shops.map(s=>{const on=s.id===sel,pt=s.badge==="TireRx Partner";return <g key={s.id} onClick={()=>onSel(s.id)} style={{cursor:"pointer"}}>{on&&<circle cx={s.x} cy={s.y} r={10} fill="rgba(201,168,76,0.18)"/>}<circle cx={s.x} cy={s.y} r={on?6:4} fill={on?G:pt?G:"rgba(255,255,255,0.7)"} stroke={on?GL:"none"} strokeWidth={on?1.5:0}/>{on&&<text x={s.x} y={s.y-9} textAnchor="middle" fontSize="3.5" fill={GL}>{s.name}</text>}</g>;})}</svg><div style={{position:"absolute",bottom:10,left:10,display:"flex",gap:12}}>{[["#4AA8FF","You"],[G,"Partner"],["rgba(255,255,255,0.65)","Shop"]].map(([c,l])=><div key={l} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:7,height:7,borderRadius:"50%",background:c}}/><span style={{fontSize:9,color:T3}}>{l}</span></div>)}</div></div>;}

function App(){
const [sc,setSc]=useState("welcome");
const [p,setP]=useState({zip:"",city:"",state:"",climate:"",delivery:"",year:"",make:"",model:"",trimSize:"",vehicle:"",style:"",terrain:"",budget:"mid",priorities:{treadLife:3,rideComfort:3,roadNoise:3,tractionBraking:3,handling:3}});
const [results,setResults]=useState([]);
const [tire,setTire]=useState(null);
const [exp,setExp]=useState(null);
const [selShop,setSelShop]=useState(null);
const [booking,setBooking]=useState(null);
const [shopFilter,setShopFilter]=useState("All");
const [shopView,setShopView]=useState("list");
const [shipDone,setShipDone]=useState(false);
const [bStep,setBStep]=useState(1);
const [bDate,setBDate]=useState(null);
const [bTime,setBTime]=useState(null);
const [bName,setBName]=useState("");
const [bPhone,setBPhone]=useState("");
const up=(k,v)=>setP(x=>({...x,[k]:v}));
const upPri=(k,v)=>setP(x=>({...x,priorities:{...x.priorities,[k]:v}}));
const go=s=>{setSc(s);setExp(null);window.scrollTo(0,0);};
const compute=()=>{setResults(matchTires(p));go("results");};
const restart=()=>{setSc("welcome");setTire(null);setResults([]);setExp(null);setSelShop(null);setBooking(null);setShipDone(false);setBStep(1);setBDate(null);setBTime(null);setBName("");setBPhone("");setP({zip:"",city:"",state:"",climate:"",delivery:"",year:"",make:"",model:"",trimSize:"",vehicle:"",style:"",terrain:"",budget:"mid",priorities:{treadLife:3,rideComfort:3,roadNoise:3,tractionBraking:3,handling:3}});};
const fShops=SHOPS.filter(s=>{if(shopFilter==="TireRx Partners")return s.badge==="TireRx Partner";if(shopFilter==="Open Now")return s.openNow;if(shopFilter==="Top Rated")return s.rating>=4.6;return true;});
const D=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const M=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const today=new Date();
const dates=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()+i+1);return d;});
const times=["8:00 AM","9:00 AM","10:00 AM","11:00 AM","1:00 PM","2:00 PM","3:00 PM","4:00 PM"];
const busy=["10:00 AM","2:00 PM"];
const dl=bDate!==null?`${D[dates[bDate].getDay()]}, ${M[dates[bDate].getMonth()]} ${dates[bDate].getDate()}`:"";

if(sc==="welcome")return <Shell><div style={{textAlign:"center",paddingTop:20}}>
<div style={{fontSize:64,marginBottom:18}}>🛞</div>
<h1 style={{fontSize:40,fontWeight:800,letterSpacing:"-1.5px",background:`linear-gradient(135deg,${GL},${G},#B8923C)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:12}}>TireRx</h1>
<p style={{color:T2,fontSize:16,lineHeight:1.7,marginBottom:24}}>The concierge tire service.<br/>We diagnose. We match. We deliver.</p>
<div style={{display:"flex",justifyContent:"center",gap:24,marginBottom:28}}>{[["🩺","Intake Exam"],["🎯","Exact Match"],["📍","Shop or Ship"]].map(([ic,l])=><div key={l} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}><span style={{fontSize:24}}>{ic}</span><span style={{fontSize:12,color:T2}}>{l}</span></div>)}</div>
<div style={{background:"rgba(201,168,76,0.07)",border:`1px solid rgba(201,168,76,0.25)`,borderRadius:16,padding:20,marginBottom:24,textAlign:"left",position:"relative",overflow:"hidden"}}>
<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${G},${GL})`}}/>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
<div><div style={{fontWeight:800,fontSize:18,color:T1}}>TireRx Member</div><div style={{fontSize:12,color:T2,marginTop:3}}>Full concierge access</div></div>
<div style={{textAlign:"right"}}><div style={{fontSize:28,fontWeight:800,color:G}}>$0.99</div><div style={{fontSize:11,color:T3}}>/month</div></div>
</div>
{["Personalized tire diagnosis and match","Local shop finder plus ship to home","Best price across all retailers","Seasonal reminders and safety alerts"].map(f=><div key={f} style={{display:"flex",gap:10,marginBottom:9}}><span style={{color:G,fontSize:13}}>✦</span><span style={{fontSize:14,color:T2}}>{f}</span></div>)}
</div>
<PBtn onClick={()=>go("location")}>Start My Free Consultation</PBtn>
<p style={{fontSize:12,color:T3,marginTop:10}}>No credit card required to start</p>
</div></Shell>;

if(sc==="location")return <Shell step={1} total={5} label="Your Location" onBack={()=>go("welcome")}>
<h2 style={{fontWeight:800,fontSize:24,color:T1,marginBottom:6}}>Where are you located?</h2>
<p style={{fontSize:14,color:T2,lineHeight:1.6,marginBottom:20}}>We detect your climate zone and find installers near you.</p>
<div style={{display:"flex",gap:10,marginBottom:14}}>
<div style={{flex:1}}><FL>ZIP Code</FL><Inp value={p.zip} onChange={e=>up("zip",e.target.value)} placeholder="48104" maxLength={5} inputMode="numeric"/></div>
<div style={{width:90}}><FL>State</FL><select value={p.state} onChange={e=>{up("state",e.target.value);up("climate",climateFrom(e.target.value));}} style={{width:"100%",padding:"13px 8px",background:"rgba(255,255,255,0.06)",border:`1.5px solid ${BORDER}`,borderRadius:11,color:T1,fontSize:14,outline:"none"}}><option value="">--</option>{["AK","AL","AR","AZ","CA","CO","CT","DC","DE","FL","GA","HI","IA","ID","IL","IN","KS","KY","LA","MA","MD","ME","MI","MN","MO","MS","MT","NC","ND","NE","NH","NJ","NM","NV","NY","OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VA","VT","WA","WI","WV","WY"].map(s=><option key={s}>{s}</option>)}</select></div>
</div>
<div style={{marginBottom:16}}><FL>City</FL><Inp value={p.city} onChange={e=>up("city",e.target.value)} placeholder="Ann Arbor"/></div>
{p.climate&&<div style={{background:"rgba(201,168,76,0.1)",border:`1px solid rgba(201,168,76,0.3)`,borderRadius:11,padding:"12px 16px",marginBottom:20,display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:24}}>{CX[p.climate]}</span><div><div style={{fontSize:13,color:T3}}>Climate zone detected</div><div style={{fontSize:15,fontWeight:700,color:GL,textTransform:"capitalize",marginTop:1}}>{p.climate} climate</div></div></div>}
<FL>How would you like your tires?</FL>
<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:6}}>
{[{val:"shop",icon:"🏪",label:"Install at a local shop",sub:"We find certified installers near you"},{val:"ship",icon:"📦",label:"Ship directly to my home",sub:"Order online delivered to your door"},{val:"both",icon:"✦",label:"Show me both options",sub:"I will decide after seeing my matches"}].map(opt=><button key={opt.val} onClick={()=>up("delivery",opt.val)} style={{background:p.delivery===opt.val?"rgba(201,168,76,0.1)":CARD,border:`1.5px solid ${p.delivery===opt.val?"rgba(201,168,76,0.5)":BORDER}`,borderRadius:13,padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,textAlign:"left"}}><span style={{fontSize:24}}>{opt.icon}</span><div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:p.delivery===opt.val?GL:T1}}>{opt.label}</div><div style={{fontSize:12,color:T2,marginTop:3}}>{opt.sub}</div></div>{p.delivery===opt.val?<span style={{color:G,fontSize:18}}>✓</span>:<span style={{color:T3,fontSize:18}}>›</span>}</button>)}
</div>
<PBtn onClick={()=>go("vehicle")} disabled={!p.zip||!p.state||!p.delivery}>Continue</PBtn>
</Shell>;

if(sc==="vehicle")return <Shell step={2} total={5} label="Your Vehicle" onBack={()=>go("location")}>
<h2 style={{fontWeight:800,fontSize:24,color:T1,marginBottom:6}}>Tell us about your vehicle</h2>

{shopView==="map"&&<div style={{height:"calc(100vh - 230px)",position:"relative",borderRadius:14,overflow:"hidden"}}>
<MapView shops={fShops} sel={selShop} onSel={id=>setSelShop(id===selShop?null:id)}/>
{selShop&&(()=>{const s=SHOPS.find(x=>x.id===selShop);return s?<div style={{position:"absolute",bottom:12,left:12,right:12,background:"rgba(12,12,20,0.97)",border:`1px solid rgba(201,168,76,0.35)`,borderRadius:13,padding:"13px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,fontSize:14,color:T1}}>{s.name}</div><div style={{fontSize:12,color:T2,marginTop:2}}>{s.distance} mi · {s.wait}</div></div><button onClick={()=>{setBooking(s);setBStep(1);setBDate(null);setBTime(null);}} style={{padding:"10px 18px",background:`linear-gradient(135deg,${G},${GL})`,border:"none",borderRadius:10,fontSize:13,fontWeight:700,color:"#0a0a10",cursor:"pointer"}}>Book</button></div>:null;})()}
</div>}

{shopView==="split"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
<div style={{overflowY:"auto",maxHeight:"calc(100vh - 230px)"}}>
{fShops.map(s=><div key={s.id} className="fu" onClick={()=>setSelShop(selShop===s.id?null:s.id)} style={{background:selShop===s.id?"rgba(201,168,76,0.08)":CARD,border:`1.5px solid ${selShop===s.id?"rgba(201,168,76,0.45)":BORDER}`,borderRadius:13,padding:13,marginBottom:10,cursor:"pointer"}}><div style={{display:"flex",gap:10,alignItems:"center"}}><div style={{width:38,height:38,borderRadius:9,background:"rgba(255,255,255,0.07)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:T3,flexShrink:0}}>{s.img}</div><div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:14,color:T1}}>{s.name}</div><div style={{fontSize:11,color:T2,marginTop:2}}>{s.distance} mi · <span style={{color:s.openNow?"#4CAF7D":T3}}>{s.openNow?"Open":"Closed"}</span></div></div>{selShop===s.id&&<button onClick={e=>{e.stopPropagation();setBooking(s);setBStep(1);setBDate(null);setBTime(null);}} style={{padding:"7px 14px",background:`linear-gradient(135deg,${G},${GL})`,border:"none",borderRadius:8,fontSize:12,fontWeight:700,color:"#0a0a10",cursor:"pointer",flexShrink:0}}>Book</button>}</div></div>)}
</div>
<div style={{height:"calc(100vh - 230px)",borderRadius:14,overflow:"hidden",position:"relative"}}>
<MapView shops={fShops} sel={selShop} onSel={id=>setSelShop(id===selShop?null:id)}/>
{selShop&&(()=>{const s=SHOPS.find(x=>x.id===selShop);return s?<div style={{position:"absolute",bottom:10,left:10,right:10,background:"rgba(12,12,20,0.96)",border:`1px solid rgba(201,168,76,0.3)`,borderRadius:10,padding:"10px 13px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,fontSize:13,color:T1}}>{s.name}</div><div style={{fontSize:11,color:T2}}>{s.distance} mi</div></div><button onClick={()=>{setBooking(s);setBStep(1);setBDate(null);setBTime(null);}} style={{padding:"7px 14px",background:`linear-gradient(135deg,${G},${GL})`,border:"none",borderRadius:8,fontSize:12,fontWeight:700,color:"#0a0a10",cursor:"pointer"}}>Book</button></div>:null;})()}
</div>
</div>}
<div style={{marginTop:16}}><GBtn onClick={restart}>Start New Consultation</GBtn></div>
</div>

{booking&&<div style={{position:"fixed",inset:0,zIndex:999,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setBooking(null)}>
<div style={{width:"100%",maxWidth:460,background:"linear-gradient(180deg,#16162a,#0e0e1c)",border:`1px solid rgba(201,168,76,0.3)`,borderRadius:"22px 22px 0 0",padding:"22px 22px 48px",maxHeight:"92vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
<div style={{width:40,height:4,background:"rgba(255,255,255,0.15)",borderRadius:99,margin:"0 auto 20px"}}/>
{bStep===1&&<>
<div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}><div style={{width:44,height:44,borderRadius:11,background:"rgba(201,168,76,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:G}}>{booking.img}</div><div><div style={{fontWeight:700,fontSize:16,color:T1}}>{booking.name}</div><div style={{fontSize:12,color:T2,marginTop:2}}>{booking.address}</div></div></div>
{tire&&<div style={{background:"rgba(201,168,76,0.1)",border:`1px solid rgba(201,168,76,0.25)`,borderRadius:11,padding:"11px 14px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:11,color:T3}}>Installing</div><div style={{fontSize:14,fontWeight:700,color:T1,marginTop:2}}>{tire.brand} {tire.model}</div></div><div style={{fontSize:20,fontWeight:800,color:G}}>${tire.price}<span style={{fontSize:11,color:T3}}>/ea</span></div></div>}
<div style={{fontSize:13,color:T2,fontWeight:600,marginBottom:10}}>Select a date</div>
<div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:18}}>{dates.map((d,i)=><button key={i} onClick={()=>setBDate(i)} style={{flexShrink:0,width:54,padding:"10px 0",background:bDate===i?"rgba(201,168,76,0.18)":CARD,border:`1.5px solid ${bDate===i?"rgba(201,168,76,0.6)":BORDER}`,borderRadius:12,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:10,color:bDate===i?G:T3,fontWeight:600}}>{D[d.getDay()]}</span><span style={{fontSize:17,fontWeight:700,color:bDate===i?GL:T1}}>{d.getDate()}</span><span style={{fontSize:9,color:T3}}>{M[d.getMonth()]}</span></button>)}</div>
<div style={{fontSize:13,color:T2,fontWeight:600,marginBottom:10}}>Select a time</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:22}}>{times.map(t=>{const b=busy.includes(t);return<button key={t} disabled={b} onClick={()=>!b&&setBTime(t)} style={{padding:"10px 4px",background:bTime===t?"rgba(201,168,76,0.18)":b?"rgba(255,255,255,0.02)":CARD,border:`1px solid ${bTime===t?"rgba(201,168,76,0.6)":BORDER}`,borderRadius:9,fontSize:12,fontWeight:600,color:b?T3:bTime===t?GL:T2,cursor:b?"not-allowed":"pointer",textDecoration:b?"line-through":"none"}}>{t}</button>;})}</div>
<PBtn onClick={()=>setBStep(2)} disabled={bDate===null||!bTime}>Continue</PBtn>
</>}
{bStep===2&&<>
<h3 style={{fontWeight:800,fontSize:20,color:T1,marginBottom:4}}>Confirm Your Booking</h3>
<p style={{fontSize:13,color:T2,marginBottom:16}}>We will send a text reminder before your appointment.</p>
<div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:16,marginBottom:16}}>{[["Shop",booking.name],["Date",dl],["Time",bTime],["Install",booking.price]].map(([l,v])=><div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{fontSize:13,color:T3}}>{l}</span><span style={{fontSize:13,color:T1,fontWeight:600}}>{v}</span></div>)}</div>
<div style={{fontSize:12,color:T3,fontWeight:600,marginBottom:6}}>Your Name</div>
<input style={{width:"100%",padding:"11px 13px",background:"rgba(255,255,255,0.06)",border:`1.5px solid ${BORDER}`,borderRadius:10,color:T1,fontSize:13,outline:"none",marginBottom:10}} placeholder="Alex Johnson" value={bName} onChange={e=>setBName(e.target.value)}/>
<div style={{fontSize:12,color:T3,fontWeight:600,marginBottom:6}}>Phone Number</div>
<input style={{width:"100%",padding:"11px 13px",background:"rgba(255,255,255,0.06)",border:`1.5px solid ${BORDER}`,borderRadius:10,color:T1,fontSize:13,outline:"none",marginBottom:10}} placeholder="(734) 555-0100" value={bPhone} onChange={e=>setBPhone(e.target.value)} inputMode="tel"/>
<PBtn onClick={()=>setBStep(3)} disabled={!bName||!bPhone}>Confirm Appointment</PBtn>
<GBtn onClick={()=>setBStep(1)}>Change Date and Time</GBtn>
</>}
{bStep===3&&<div style={{textAlign:"center",paddingTop:12}}>
<div style={{fontSize:56,marginBottom:16}}>✅</div>
<h3 style={{fontWeight:800,fontSize:22,color:GL,marginBottom:8}}>You are All Set!</h3>
<p style={{fontSize:14,color:T2,lineHeight:1.7,marginBottom:20}}>Appointment confirmed at {booking.name}. We will text a reminder before your visit.</p>
<div style={{background:"rgba(201,168,76,0.1)",border:`1px solid rgba(201,168,76,0.25)`,borderRadius:14,padding:16,marginBottom:22,textAlign:"left"}}>{[["Shop",booking.name],["Date",dl],["Time",bTime],["Address",booking.address]].map(([l,v])=><div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:12,color:T3}}>{l}</span><span style={{fontSize:12,color:T1,fontWeight:600}}>{v}</span></div>)}</div>
<PBtn onClick={()=>setBooking(null)}>Done</PBtn>
</div>}
</div>
</div>}
</div>;

return null;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
